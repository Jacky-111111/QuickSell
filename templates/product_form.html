{% extends "base.html" %}
{% block title %}QuickSell | {{ page_title }}{% endblock %}
{% block content %}
<section class="panel form-panel">
    <h2>{{ page_title }}</h2>
    {% set current_category = product['category'] if product else '' %}

    <form method="post" class="form-grid">
        <label>
            Product name
            <input name="name" type="text" required value="{{ product['name'] if product else '' }}">
        </label>
        <label>
            Category
            <select id="category_select" name="selected_category">
                <option value="">-- Select category --</option>
                {% for cat in categories %}
                    <option value="{{ cat }}" {% if current_category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
                <option value="__new__" {% if current_category and current_category not in categories %}selected{% endif %}>+ Create new category</option>
            </select>
        </label>
        <label id="new-category-row" class="{% if current_category and current_category not in categories %}{% else %}hidden{% endif %}">
            New category name
            <input
                id="new_category_input"
                name="new_category"
                type="text"
                placeholder="Type a new category"
                value="{% if current_category and current_category not in categories %}{{ current_category }}{% endif %}"
            >
        </label>
        <label>
            Price ($)
            <input name="price" type="number" min="0" step="0.01" required value="{{ product['price'] if product else '' }}">
        </label>
        <label>
            Stock quantity
            <input name="stock_quantity" type="number" min="0" step="1" required value="{{ product['stock_quantity'] if product else 0 }}">
        </label>
        <label class="full-width">
            Description
            <textarea name="description" rows="4">{{ product['description'] if product else '' }}</textarea>
        </label>
        <label class="full-width">
            Image URL (optional)
            <input name="image_url" type="url" value="{{ product['image_url'] if product else '' }}">
        </label>
        <label class="full-width">
            Colors (comma separated)
            <input name="colors" type="text" placeholder="Sand, Forest, Slate" value="{{ color_csv }}">
        </label>
        <label class="checkbox-row full-width">
            <input name="is_active" type="checkbox" {% if product and product['is_active'] %}checked{% elif not product %}checked{% endif %}>
            Product is active and visible to buyers
        </label>
        <button class="btn btn-primary" type="submit">Save Product</button>
        <a class="btn btn-secondary" href="/merchant/dashboard">Cancel</a>
    </form>
</section>
{% endblock %}
