{% extends "base.html" %}
{% block title %}QuickSell | {{ page_title }}{% endblock %}
{% block content %}
<section class="panel form-panel">
    <h2>{{ page_title }}</h2>

    <form method="post" class="form-grid">
        <label>
            Product name
            <input name="name" type="text" required value="{{ product['name'] if product else '' }}">
        </label>
        <label>
            Category
            <input name="category" type="text" placeholder="Clothing, Accessories, Home, Tech" value="{{ product['category'] if product else '' }}">
        </label>
        <label>
            Price
            <input name="price" type="number" min="0" step="0.01" required value="{{ product['price'] if product else '' }}">
        </label>
        <label>
            Stock quantity
            <input name="stock_quantity" type="number" min="0" step="1" required value="{{ product['stock_quantity'] if product else 0 }}">
        </label>
        <label class="full-width">
            Description
            <textarea name="description" rows="4">{{ product['description'] if product else '' }}</textarea>
        </label>
        <label class="full-width">
            Image URL (optional)
            <input name="image_url" type="url" value="{{ product['image_url'] if product else '' }}">
        </label>
        <label class="full-width">
            Colors (comma separated)
            <input name="colors" type="text" placeholder="Sand, Forest, Slate" value="{{ color_csv }}">
        </label>
        <label class="checkbox-row full-width">
            <input name="is_active" type="checkbox" {% if product and product['is_active'] %}checked{% elif not product %}checked{% endif %}>
            Product is active and visible to buyers
        </label>
        <button class="btn btn-primary" type="submit">Save Product</button>
        <a class="btn btn-secondary" href="/merchant/dashboard">Cancel</a>
    </form>
</section>
{% endblock %}
